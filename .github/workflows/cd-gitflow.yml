name: cd (git-flow)

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  deploy-develop:
    runs-on: ubuntu-24.04
    if: github.ref_name == 'develop'
    timeout-minutes: 15
    environment: develop
    concurrency:
      group: cd-gitflow-develop
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.31.0

      - name: Compute build metadata
        run: |
          SHA="${{ github.sha }}"
          echo "BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"
          echo "VERSION=develop-${SHA:0:7}" >> "$GITHUB_ENV"
          echo "COMMIT=${SHA}" >> "$GITHUB_ENV"

      - name: Set Railway variables
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway variables set \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment develop \
            VERSION="$VERSION" \
            COMMIT="$COMMIT" \
            BUILD_TIME="$BUILD_TIME"

      - name: Deploy to Railway (develop)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment develop \
            --ci

  deploy-hotfix:
    runs-on: ubuntu-24.04
    if: startsWith(github.ref_name, 'hotfix/')
    timeout-minutes: 15
    environment: develop
    concurrency:
      group: cd-gitflow-develop
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.31.0

      - name: Compute build metadata
        run: |
          SHA="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"
          HOTFIX_NAME="${BRANCH#hotfix/}"
          echo "BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"
          echo "VERSION=hotfix-${HOTFIX_NAME}-${SHA:0:7}" >> "$GITHUB_ENV"
          echo "COMMIT=${SHA}" >> "$GITHUB_ENV"

      - name: Set Railway variables
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway variables set \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment develop \
            VERSION="$VERSION" \
            COMMIT="$COMMIT" \
            BUILD_TIME="$BUILD_TIME"

      - name: Deploy to Railway (develop)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment develop \
            --ci

  deploy-staging:
    runs-on: ubuntu-24.04
    if: startsWith(github.ref_name, 'release/')
    timeout-minutes: 15
    environment: staging
    concurrency:
      group: cd-gitflow-staging
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.31.0

      - name: Compute build metadata
        run: |
          SHA="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"
          RELEASE_VERSION="${BRANCH#release/}"
          echo "BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"
          echo "VERSION=${RELEASE_VERSION}-${SHA:0:7}" >> "$GITHUB_ENV"
          echo "COMMIT=${SHA}" >> "$GITHUB_ENV"

      - name: Set Railway variables
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway variables set \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment staging \
            VERSION="$VERSION" \
            COMMIT="$COMMIT" \
            BUILD_TIME="$BUILD_TIME"

      - name: Deploy to Railway (staging)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment staging \
            --ci

  deploy-production:
    runs-on: ubuntu-24.04
    if: github.ref_name == 'main'
    timeout-minutes: 15
    environment: production
    concurrency:
      group: cd-gitflow-production
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.31.0

      - name: Compute build metadata
        run: |
          SHA="${{ github.sha }}"
          echo "BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"
          echo "VERSION=main-${SHA:0:7}" >> "$GITHUB_ENV"
          echo "COMMIT=${SHA}" >> "$GITHUB_ENV"

      - name: Set Railway variables
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway variables set \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment production \
            VERSION="$VERSION" \
            COMMIT="$COMMIT" \
            BUILD_TIME="$BUILD_TIME"

      - name: Deploy to Railway (production)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment production \
            --ci
