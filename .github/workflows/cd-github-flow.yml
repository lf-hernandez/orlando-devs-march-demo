name: cd (github-flow)

on:
  workflow_run:
    workflows: [ci]
    branches: [main, 'feature/**']
    types: [completed]

permissions:
  contents: read

jobs:
  deploy-preview:
    runs-on: ubuntu-24.04
    if: startsWith(github.event.workflow_run.head_branch, 'feature/') && github.event.workflow_run.conclusion == 'success'
    environment: staging
    concurrency:
      group: cd-github-flow-staging
      cancel-in-progress: false

    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Railway CLI
        run: bash <(curl -fsSL cli.new/install.sh)

      - name: Compute build metadata
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          FEATURE_NAME="${BRANCH#feature/}"
          echo "BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"
          echo "VERSION=${FEATURE_NAME}-${SHA:0:7}" >> "$GITHUB_ENV"
          echo "COMMIT=${SHA}" >> "$GITHUB_ENV"

      - name: Set Railway variables
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway variables set \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment staging \
            VERSION="$VERSION" \
            COMMIT="$COMMIT" \
            BUILD_TIME="$BUILD_TIME"

      - name: Deploy preview to Railway (staging)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment staging \
            --ci

  deploy-production:
    runs-on: ubuntu-24.04
    if: github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.conclusion == 'success'
    environment: production
    concurrency:
      group: cd-github-flow-production
      cancel-in-progress: false

    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Railway CLI
        run: bash <(curl -fsSL cli.new/install.sh)

      - name: Compute build metadata
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"
          echo "VERSION=main-${SHA:0:7}" >> "$GITHUB_ENV"
          echo "COMMIT=${SHA}" >> "$GITHUB_ENV"

      - name: Set Railway variables
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway variables set \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment production \
            VERSION="$VERSION" \
            COMMIT="$COMMIT" \
            BUILD_TIME="$BUILD_TIME"

      - name: Deploy to Railway (production)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment production \
            --ci
