name: cd (gitlab-flow)

on:
  workflow_run:
    workflows: [ci]
    branches: [main, staging, production]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy-integration:
    runs-on: ubuntu-24.04
    if: github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.conclusion == 'success'
    environment: develop
    concurrency:
      group: cd-gitlab-flow-develop
      cancel-in-progress: false

    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Railway CLI
        run: bash <(curl -fsSL cli.new/install.sh)

      - name: Compute build metadata
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"
          echo "VERSION=main-${SHA:0:7}" >> "$GITHUB_ENV"
          echo "COMMIT=${SHA}" >> "$GITHUB_ENV"

      - name: Set Railway variables
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway variables set \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment develop \
            VERSION="$VERSION" \
            COMMIT="$COMMIT" \
            BUILD_TIME="$BUILD_TIME"

      - name: Deploy to Railway (develop)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment develop \
            --ci

  deploy-staging:
    runs-on: ubuntu-24.04
    if: github.event.workflow_run.head_branch == 'staging' && github.event.workflow_run.conclusion == 'success'
    environment: staging
    concurrency:
      group: cd-gitlab-flow-staging
      cancel-in-progress: false

    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Railway CLI
        run: bash <(curl -fsSL cli.new/install.sh)

      - name: Compute build metadata
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"
          echo "VERSION=staging-${SHA:0:7}" >> "$GITHUB_ENV"
          echo "COMMIT=${SHA}" >> "$GITHUB_ENV"

      - name: Set Railway variables
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway variables set \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment staging \
            VERSION="$VERSION" \
            COMMIT="$COMMIT" \
            BUILD_TIME="$BUILD_TIME"

      - name: Deploy to Railway (staging)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment staging \
            --ci

  deploy-production:
    runs-on: ubuntu-24.04
    if: github.event.workflow_run.head_branch == 'production' && github.event.workflow_run.conclusion == 'success'
    environment: production
    concurrency:
      group: cd-gitlab-flow-production
      cancel-in-progress: false

    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Railway CLI
        run: bash <(curl -fsSL cli.new/install.sh)

      - name: Compute build metadata
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"
          echo "VERSION=production-${SHA:0:7}" >> "$GITHUB_ENV"
          echo "COMMIT=${SHA}" >> "$GITHUB_ENV"

      - name: Set Railway variables
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway variables set \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment production \
            VERSION="$VERSION" \
            COMMIT="$COMMIT" \
            BUILD_TIME="$BUILD_TIME"

      - name: Deploy to Railway (production)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment production \
            --ci
