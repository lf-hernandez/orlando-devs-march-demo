name: cd (trunk-based)

on:
  workflow_run:
    workflows: [ci]
    branches: [main]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    concurrency:
      group: cd-trunk-based-production
      cancel-in-progress: false

    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Railway CLI
        run: bash <(curl -fsSL cli.new/install.sh)

      - name: Compute build metadata
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"
          echo "VERSION=${{ github.event.workflow_run.head_branch }}-${SHA:0:7}" >> "$GITHUB_ENV"
          echo "COMMIT=${SHA}" >> "$GITHUB_ENV"

      - name: Set Railway variables
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway variables set \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment production \
            VERSION="$VERSION" \
            COMMIT="$COMMIT" \
            BUILD_TIME="$BUILD_TIME"

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment production \
            --ci
