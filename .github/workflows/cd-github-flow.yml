name: cd (github-flow)

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  deploy-preview:
    runs-on: ubuntu-24.04
    if: startsWith(github.ref_name, 'feature/')
    timeout-minutes: 15
    environment: staging
    concurrency:
      group: cd-github-flow-staging
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.31.0

      - name: Compute build metadata
        run: |
          SHA="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"
          FEATURE_NAME="${BRANCH#feature/}"
          echo "BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"
          echo "VERSION=${FEATURE_NAME}-${SHA:0:7}" >> "$GITHUB_ENV"
          echo "COMMIT=${SHA}" >> "$GITHUB_ENV"

      - name: Set Railway variables
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway variables set \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment staging \
            VERSION="$VERSION" \
            COMMIT="$COMMIT" \
            BUILD_TIME="$BUILD_TIME"

      - name: Deploy preview to Railway (staging)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment staging \
            --ci

  deploy-production:
    runs-on: ubuntu-24.04
    if: github.ref_name == 'main'
    timeout-minutes: 15
    environment: production
    concurrency:
      group: cd-github-flow-production
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.31.0

      - name: Compute build metadata
        run: |
          SHA="${{ github.sha }}"
          echo "BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"
          echo "VERSION=main-${SHA:0:7}" >> "$GITHUB_ENV"
          echo "COMMIT=${SHA}" >> "$GITHUB_ENV"

      - name: Set Railway variables
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway variables set \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment production \
            VERSION="$VERSION" \
            COMMIT="$COMMIT" \
            BUILD_TIME="$BUILD_TIME"

      - name: Deploy to Railway (production)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment production \
            --ci
